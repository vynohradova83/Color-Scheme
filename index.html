<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Color Scheme</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
        }

        img{
            width: 700px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        table{
            width: 75%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td{
            border: 2px solid #444;
            padding: 15px;
            text-align: center;
        }

        th{
            font-size: 32px;
            letter-spacing: 2px;
        }

        .fog{
            background-color: #D9D6D2;
        }

        .forest{
            background-color: #2F3A32;
            color: white;
        }

        .moss{
            background-color: #6B705C;
            color: white;
        }

        .graphite{
            background-color: #4B4E4D;
            color: white;
        }

    </style>
</head>

<body>

    <img src="mountains.jpg" alt="Mountain Mist">

    <table>

        <tr>
            <th colspan="4">Mountain</th>
        </tr>

        <tr>
            <td class="fog">Fog White</td>
            <td class="forest">Forest Green</td>
            <td class="moss">Moss Green</td>
            <td class="graphite">Graphite Gray</td>
        </tr>

        <tr>
            <td>#D9D6D2</td>
            <td>#2F3A32</td>
            <td>#6B705C</td>
            <td>#4B4E4D</td>
        </tr>

        <tr>
            <td>rgb(217, 214, 210)</td>
            <td>rgb(47, 58, 50)</td>
            <td>rgb(107, 112, 92)</td>
            <td>rgb(75, 78, 77)</td>
        </tr>

        <tr>
            <td>hsl(34, 10%, 84%)</td>
            <td>hsl(136, 10%, 21%)</td>
            <td>hsl(75, 10%, 40%)</td>
            <td>hsl(160, 2%, 30%)</td>
        </tr>

    </table>

</body>
</html>
